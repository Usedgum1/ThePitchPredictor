<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>pitchIQ | Account Settings</title>
  <meta name="description" content="Manage your pitchIQ account settings." />
  <meta name="theme-color" content="#050505" />

  <style>
    :root {
      --bg: #050505;
      --panel: rgba(12, 14, 20, 0.64);
      --border: rgba(255, 255, 255, 0.08);
      --text: #f4f0e8;
      --muted: #a7afbc;
      --violet: #8d8aff;
      --amber: #ffb14a;
      --success: #8ddf9f;
      --danger: #ff8c7a;
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at 12% 14%, rgba(141, 138, 255, 0.2), transparent 22%),
        radial-gradient(circle at 86% 10%, rgba(255, 177, 74, 0.18), transparent 20%),
        radial-gradient(circle at 62% 28%, rgba(86, 152, 255, 0.14), transparent 18%),
        linear-gradient(180deg, #050505 0%, #090a10 100%);
    }

    button,
    input {
      font: inherit;
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 22px 18px 34px;
    }

    .shell {
      background: linear-gradient(180deg, rgba(15, 17, 24, 0.54), rgba(10, 11, 17, 0.42));
      backdrop-filter: blur(18px);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.24);
      padding: 20px;
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 22px;
      padding-bottom: 14px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    h1 {
      margin: 0;
      font-size: 1.6rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .sub {
      margin: 7px 0 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 14px;
      white-space: nowrap;
    }

    .text-link,
    .text-button {
      border: 0;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font: inherit;
      font-size: 0.78rem;
      line-height: 1.25;
      padding: 0;
      text-decoration: none;
      text-transform: lowercase;
    }

    .text-link:hover,
    .text-button:hover {
      color: var(--text);
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(260px, 0.72fr);
      gap: 16px;
      align-items: start;
    }

    .section {
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.025);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .section h2 {
      margin: 0 0 12px;
      font-size: 0.86rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .field {
      margin-bottom: 12px;
    }

    .field label {
      display: block;
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    .field input {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      background: rgba(0,0,0,0.24);
      color: var(--text);
      padding: 11px 12px;
      outline: none;
    }

    .field input:focus {
      border-color: rgba(141, 138, 255, 0.55);
      box-shadow: 0 0 0 3px rgba(141, 138, 255, 0.12);
    }

    .button {
      border: 1px solid rgba(141, 138, 255, 0.28);
      background: rgba(141, 138, 255, 0.12);
      color: var(--text);
      border-radius: 999px;
      cursor: pointer;
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      padding: 10px 15px;
      text-transform: uppercase;
    }

    .button:hover {
      border-color: rgba(141, 138, 255, 0.52);
    }

    .button:disabled {
      cursor: not-allowed;
      opacity: 0.58;
    }

    .status {
      min-height: 18px;
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.35;
      margin: 10px 0 0;
    }

    .status.success { color: var(--success); }
    .status.error { color: var(--danger); }

    .account-meta {
      display: grid;
      gap: 10px;
    }

    .meta-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding-bottom: 9px;
    }

    .meta-row:last-child {
      border-bottom: 0;
      padding-bottom: 0;
    }

    .meta-label {
      color: var(--muted);
      font-size: 0.76rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .meta-value {
      color: var(--text);
      font-size: 0.88rem;
      max-width: 62%;
      overflow: hidden;
      text-align: right;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .tier-list {
      display: grid;
      gap: 10px;
    }

    .tier {
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 12px;
      background: rgba(0,0,0,0.18);
    }

    .tier.current {
      border-color: rgba(255, 177, 74, 0.34);
      background: rgba(255, 177, 74, 0.08);
      box-shadow:
        0 0 0 1px rgba(255, 177, 74, 0.12) inset,
        0 0 26px rgba(255, 177, 74, 0.18),
        0 0 42px rgba(141, 223, 159, 0.1);
    }

    .tier-title {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-size: 0.9rem;
      font-weight: 800;
      text-transform: capitalize;
    }

    .tier-name-basic,
    .tier-value-basic {
      color: #b7bdc8;
    }

    .tier-name-pro,
    .tier-value-pro {
      color: var(--success);
    }

    .tier-name-life,
    .tier-value-life {
      color: #ffd76a;
    }

    .tier-name-owner,
    .tier-value-owner {
      color: var(--danger);
    }

    .tier-name-admin,
    .tier-value-admin {
      color: var(--violet);
    }

    .tier-copy {
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.45;
      margin: 6px 0 0;
    }

    .tier-cta {
      align-items: center;
      border: 1px solid rgba(255, 177, 74, 0.42);
      background: linear-gradient(135deg, rgba(141, 223, 159, 0.16), rgba(255, 177, 74, 0.16));
      color: var(--text);
      border-radius: 999px;
      cursor: not-allowed;
      display: inline-flex;
      font-size: 0.68rem;
      font-weight: 900;
      gap: 7px;
      letter-spacing: 0.08em;
      margin-top: 12px;
      padding: 8px 12px;
      text-transform: uppercase;
    }

    .tier-lock {
      color: var(--success);
      font-size: 0.8rem;
      line-height: 1;
    }

    .tier-cta-pro {
      border-color: rgba(141, 223, 159, 0.42);
      background: rgba(141, 223, 159, 0.14);
      color: var(--success);
    }

    .tier-cta-pro .tier-lock {
      color: var(--success);
    }

    .tier-cta-life {
      border-color: rgba(255, 215, 106, 0.46);
      background: rgba(255, 215, 106, 0.13);
      color: #ffd76a;
    }

    .tier-cta-life .tier-lock {
      color: #ffd76a;
    }

    .badge {
      color: var(--amber);
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    @media (max-width: 760px) {
      .topbar,
      .layout {
        grid-template-columns: 1fr;
      }

      .topbar {
        flex-direction: column;
      }

      .top-actions {
        flex-wrap: wrap;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="shell">
      <div class="topbar">
        <div>
          <h1>Account Settings</h1>
          <p class="sub">Manage your pitchIQ login, username, and account tier.</p>
        </div>
        <div class="top-actions">
          <a class="text-link" href="./app.html">back to app</a>
          <button class="text-button" id="logout-button" type="button">sign out</button>
        </div>
      </div>

      <div class="layout">
        <div>
          <section class="section">
            <h2>Profile</h2>
            <form id="username-form">
              <div class="field">
                <label for="username-input">Username</label>
                <input id="username-input" name="username" type="text" autocomplete="username" maxlength="32" />
              </div>
              <button class="button" type="submit">Save Username</button>
              <p class="status" id="username-status"></p>
            </form>
          </section>

          <section class="section">
            <h2>Email</h2>
            <form id="email-form">
              <div class="field">
                <label for="email-input">New Email</label>
                <input id="email-input" name="email" type="email" autocomplete="email" />
              </div>
              <div class="field">
                <label for="email-current-password">Current Password</label>
                <input id="email-current-password" name="current_password" type="password" autocomplete="current-password" />
              </div>
              <button class="button" type="submit">Update Email</button>
              <p class="status" id="email-status"></p>
            </form>
          </section>

          <section class="section">
            <h2>Password</h2>
            <form id="password-form">
              <div class="field">
                <label for="current-password-input">Current Password</label>
                <input id="current-password-input" name="current_password" type="password" autocomplete="current-password" />
              </div>
              <div class="field">
                <label for="new-password-input">New Password</label>
                <input id="new-password-input" name="new_password" type="password" autocomplete="new-password" minlength="8" />
              </div>
              <div class="field">
                <label for="confirm-password-input">Confirm New Password</label>
                <input id="confirm-password-input" name="confirm_password" type="password" autocomplete="new-password" minlength="8" />
              </div>
              <button class="button" type="submit">Update Password</button>
              <p class="status" id="password-status"></p>
            </form>
          </section>
        </div>

        <aside>
          <section class="section">
            <h2>Current Account</h2>
            <div class="account-meta">
              <div class="meta-row">
                <span class="meta-label">Email</span>
                <span class="meta-value" id="current-email">loading</span>
              </div>
              <div class="meta-row">
                <span class="meta-label">Username</span>
                <span class="meta-value" id="current-username">loading</span>
              </div>
              <div class="meta-row">
                <span class="meta-label">Tier</span>
                <span class="meta-value" id="current-tier">loading</span>
              </div>
            </div>
          </section>

          <section class="section">
            <h2>Tier</h2>
            <div class="tier-list" id="tier-list"></div>
          </section>
        </aside>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://odvopvoqssamjquinhft.supabase.co";
    const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_7g1yX__kNzT-6tj8Tr4SIg_T4BX9BlV";
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY, {
      auth: {
        autoRefreshToken: true,
        detectSessionInUrl: true,
        persistSession: true,
        storage: window.localStorage,
      },
    });

    const ALLOWED_ACCOUNT_ROLES = ["basic", "pro", "life", "admin", "owner"];
    const DISPLAY_TIERS = ["basic", "pro", "life"];
    const tierDetails = {
      basic: "Starter access while the account system is being built.",
      pro: "Future upgraded access for expanded tools and premium views.",
      life: "Access to everything, all the time, forever."
    };
    const tierActions = {
      pro: "Upgrade",
      life: "Invite Only"
    };

    const usernameForm = document.getElementById("username-form");
    const emailForm = document.getElementById("email-form");
    const passwordForm = document.getElementById("password-form");
    const usernameInput = document.getElementById("username-input");
    const emailInput = document.getElementById("email-input");
    const currentEmail = document.getElementById("current-email");
    const currentUsername = document.getElementById("current-username");
    const currentTier = document.getElementById("current-tier");
    const tierList = document.getElementById("tier-list");
    const logoutButton = document.getElementById("logout-button");

    let activeSession = null;
    let activeRole = null;

    function setStatus(id, message, tone) {
      const element = document.getElementById(id);
      element.textContent = message || "";
      element.className = `status${tone ? ` ${tone}` : ""}`;
    }

    async function getUserRole(userId) {
      const { data, error } = await supabaseClient
        .from("profiles")
        .select("role")
        .eq("user_id", userId)
        .single();

      if (error) {
        return { role: null, error };
      }

      return { role: data?.role || null, error: null };
    }

    function renderAccount() {
      const user = activeSession?.user;
      const username = String(user?.user_metadata?.username || "").trim();
      const email = user?.email || "";

      currentEmail.textContent = email || "unknown";
      currentUsername.textContent = username || "not set";
      currentTier.textContent = formatRoleLabel(activeRole);
      currentTier.className = `meta-value tier-value-${activeRole || ""}`;
      usernameInput.value = username;
      emailInput.value = email;

      tierList.innerHTML = DISPLAY_TIERS.map(role => `
        <div class="tier ${role === activeRole ? "current" : ""}">
          <div class="tier-title">
            <span class="tier-name-${role}">${formatRoleLabel(role)}</span>
            ${role === activeRole ? '<span class="badge">current</span>' : ""}
          </div>
          <p class="tier-copy">${tierDetails[role]}</p>
          ${tierActions[role] ? `
            <button class="tier-cta tier-cta-${role}" type="button" disabled>
              <span class="tier-lock" aria-hidden="true">&#128274;</span>
              <span>${tierActions[role]}</span>
            </button>
          ` : ""}
        </div>
      `).join("");
    }

    function formatRoleLabel(role) {
      const value = String(role || "").trim();
      if (!value) return "Unknown";
      return value.charAt(0).toUpperCase() + value.slice(1);
    }

    async function verifyCurrentPassword(password) {
      const email = activeSession?.user?.email;
      if (!email) {
        return "Unable to confirm your current email. Sign out and back in, then try again.";
      }

      const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
      if (error) {
        return "Current password is incorrect.";
      }

      const { data } = await supabaseClient.auth.getSession();
      activeSession = data.session || activeSession;
      return "";
    }

    async function requireAccount() {
      const { data, error } = await supabaseClient.auth.getSession();
      if (error || !data.session) {
        window.location.replace("./login.html");
        return;
      }

      const { role, error: roleError } = await getUserRole(data.session.user.id);
      if (roleError || !ALLOWED_ACCOUNT_ROLES.includes(role)) {
        await supabaseClient.auth.signOut();
        window.location.replace("./login.html");
        return;
      }

      activeSession = data.session;
      activeRole = role;
      renderAccount();
    }

    usernameForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      setStatus("username-status", "");

      const username = usernameInput.value.trim();
      if (username.length < 3) {
        setStatus("username-status", "Username must be at least 3 characters.", "error");
        return;
      }

      const { data, error } = await supabaseClient.auth.updateUser({
        data: { username }
      });

      if (error) {
        setStatus("username-status", error.message, "error");
        return;
      }

      activeSession = { ...activeSession, user: data.user };
      renderAccount();
      setStatus("username-status", "Username updated.", "success");
    });

    emailForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      setStatus("email-status", "");

      const formData = new FormData(emailForm);
      const email = String(formData.get("email") || "").trim();
      const currentPassword = String(formData.get("current_password") || "");

      if (!email || email === activeSession?.user?.email) {
        setStatus("email-status", "Enter a new email address.", "error");
        return;
      }

      const passwordError = await verifyCurrentPassword(currentPassword);
      if (passwordError) {
        setStatus("email-status", passwordError, "error");
        return;
      }

      const { error } = await supabaseClient.auth.updateUser(
        { email },
        { emailRedirectTo: `${window.location.origin}/account-settings.html` }
      );

      if (error) {
        setStatus("email-status", error.message, "error");
        return;
      }

      emailForm.reset();
      emailInput.value = activeSession?.user?.email || "";
      setStatus("email-status", "Email update started. Check the new email address for a confirmation link.", "success");
    });

    passwordForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      setStatus("password-status", "");

      const formData = new FormData(passwordForm);
      const currentPassword = String(formData.get("current_password") || "");
      const newPassword = String(formData.get("new_password") || "");
      const confirmPassword = String(formData.get("confirm_password") || "");

      if (newPassword.length < 8) {
        setStatus("password-status", "Password must be at least 8 characters.", "error");
        return;
      }

      if (newPassword !== confirmPassword) {
        setStatus("password-status", "Passwords do not match.", "error");
        return;
      }

      const passwordError = await verifyCurrentPassword(currentPassword);
      if (passwordError) {
        setStatus("password-status", passwordError, "error");
        return;
      }

      const { error } = await supabaseClient.auth.updateUser({ password: newPassword });
      if (error) {
        setStatus("password-status", error.message, "error");
        return;
      }

      passwordForm.reset();
      setStatus("password-status", "Password updated.", "success");
    });

    logoutButton.addEventListener("click", async () => {
      await supabaseClient.auth.signOut();
      window.location.replace("./login.html");
    });

    requireAccount();
  </script>
</body>
</html>
