<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>pitchIQ | Mobile Cards</title>
  <meta name="description" content="pitchIQ mobile trading card view for MLB strikeout props." />
  <meta name="theme-color" content="#060607" />
  <link rel="icon" type="image/x-icon" href="./images/favicon/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="./images/favicon/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="./images/favicon/apple-touch-icon.png" />
  <link rel="manifest" href="./images/favicon/site.webmanifest" />
  <link rel="stylesheet" href="./pitchiq-desktop-card.css" />

  <style>
    :root {
      --bg: #060607;
      --panel: rgba(18, 20, 28, 0.82);
      --panel-strong: rgba(24, 26, 36, 0.96);
      --line: rgba(255, 255, 255, 0.1);
      --text: #f6f1e8;
      --muted: #aab2c0;
      --violet: #9c92ff;
      --amber: #ff942e;
      --vol-medium: #fff159;
      --green: #85dfa2;
      --blue: #75b7ff;
      --red: #ff8978;
      --success: #8ddf9f;
      --danger: #ff8c7a;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at 18% 0%, rgba(156, 146, 255, 0.22), transparent 28%),
        radial-gradient(circle at 88% 8%, rgba(255, 188, 98, 0.18), transparent 26%),
        linear-gradient(180deg, #060607 0%, #0c0d12 100%);
      color: var(--text);
      font-family: "Segoe UI", Arial, sans-serif;
    }

    button,
    input,
    select {
      font: inherit;
    }

    .shell {
      width: min(100%, 460px);
      margin: 0 auto;
      padding: 12px 18px 24px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      margin: 0 -18px 10px;
      padding: 10px 18px;
      background: rgba(6, 6, 7, 0.86);
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(16px);
    }

    .brand-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .brand {
      margin: 0;
      font-size: 1.03rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .desktop-link,
    .filter-toggle {
      color: #dcd9ff;
      border: 1px solid rgba(156, 146, 255, 0.24);
      border-radius: 999px;
      padding: 7px 9px;
      background: rgba(156, 146, 255, 0.09);
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-decoration: none;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .filter-toggle {
      cursor: pointer;
    }

    .topbar.controls-collapsed {
      padding-bottom: 8px;
    }

    .topbar.controls-collapsed .brand-row {
      margin-bottom: 0;
    }

    .topbar.controls-collapsed .account,
    .topbar.controls-collapsed .controls,
    .topbar.controls-collapsed .meta {
      display: none;
    }

    .account {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 0.74rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr;
      gap: 9px;
    }

    .search {
      width: 100%;
      height: 44px;
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: 12px;
      padding: 0 13px;
      background: rgba(32, 35, 47, 0.95);
      color: var(--text);
      outline: none;
    }

    .control-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
    }

    .segmented {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      padding: 4px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.035);
    }

    .tab {
      height: 36px;
      border: 0;
      border-radius: 9px;
      background: transparent;
      color: var(--muted);
      font-size: 0.75rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .tab.active {
      background: rgba(156, 146, 255, 0.16);
      color: var(--text);
      box-shadow: inset 0 0 0 1px rgba(156, 146, 255, 0.2);
    }

    .sort {
      height: 46px;
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: 12px;
      padding: 0 11px;
      background: rgba(32, 35, 47, 0.95);
      color: var(--text);
      outline: none;
    }

    .meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin: 12px 2px;
      color: var(--muted);
      font-size: 0.73rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .cards {
      display: grid;
      gap: 14px;
      justify-items: center;
    }

    /* Narrower than a wide-desktop column so the card does not dominate the phone */
    .cards .desktop-card {
      width: 100%;
      max-width: min(304px, 100%);
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    /* Content-sized height; flip shell still needs a definite box (see .desktop-card-shell) */
    .shell .cards .desktop-card.live {
      height: 364px;
      min-height: 364px;
      max-height: 364px;
    }

    .shell .cards .desktop-card.live .desktop-card-face {
      border-width: 4px;
      border-radius: 14px;
    }

    .desktop-card-back .desktop-card-inner {
      overflow-y: auto;
      max-height: 100%;
    }

    .desktop-live-name.medium-name {
      font-size: clamp(0.95rem, 4.2vw, 1.22rem);
    }

    .desktop-live-name.long-name {
      font-size: clamp(0.84rem, 3.8vw, 1.08rem);
    }

    .desktop-live-name.very-long-name {
      font-size: clamp(0.74rem, 3.4vw, 0.96rem);
    }

    .desktop-live-name.extra-long-name {
      font-size: clamp(0.66rem, 3vw, 0.86rem);
    }

    .lookup-icon-btn {
      width: 26px;
      height: 26px;
      border-radius: 999px;
      border: 1px solid rgba(35, 134, 235, 0.36);
      background: rgba(24, 91, 173, 0.12);
      color: #6bb6ff;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.78rem;
      line-height: 1;
      padding: 0;
    }

    .lookup-icon-btn:hover {
      border-color: rgba(35, 134, 235, 0.68);
      background: rgba(24, 91, 173, 0.2);
      box-shadow: 0 0 14px rgba(35, 134, 235, 0.3);
    }

    .historical-lookup-btn {
      border-color: rgba(255, 148, 46, 0.48);
      background: rgba(255, 148, 46, 0.1);
      color: #ff942e;
      font-weight: 950;
      text-shadow: 0 0 10px rgba(255, 148, 46, 0.5);
    }

    .historical-lookup-btn:hover {
      border-color: rgba(255, 148, 46, 0.76);
      background: rgba(255, 148, 46, 0.18);
      box-shadow: 0 0 16px rgba(255, 148, 46, 0.32);
    }

    .historical-lookup-btn svg {
      width: 13px;
      height: 13px;
      stroke: currentColor;
      filter: drop-shadow(0 0 4px rgba(255, 148, 46, 0.45));
    }

    .desktop-card-note-card.neutral {
      border-color: rgba(210, 180, 140, 0.34);
      background: rgba(58, 45, 31, 0.34);
    }

    /* Desktop card chrome is tuned for wide grids; scale it down inside the mobile shell */
    .shell .cards .desktop-card-history-action {
      width: 28px;
      height: 28px;
      top: 7px;
      right: 7px;
      font-size: 0.72rem;
    }

    .shell .cards .desktop-card-history-action svg {
      width: 14px;
      height: 14px;
    }

    .shell .cards .desktop-live-watermark {
      display: none;
    }

    .shell .cards .desktop-live-name {
      font-size: clamp(0.88rem, 3.8vw, 1.05rem);
    }

    .shell .cards .desktop-live-team {
      font-size: 0.5rem;
      letter-spacing: 0.1em;
    }

    .shell .cards .desktop-live-opponent {
      font-size: 0.68rem;
    }

    .shell .cards .desktop-live-date {
      font-size: 0.68rem;
    }

    .shell .cards .desktop-live-status,
    .shell .cards .desktop-live-time {
      font-size: 0.52rem;
    }

    /*
      Mobile live card in quarters (middle row = two logical quarters):
      1fr — player / team header
      1fr — matchup + status / time
      2fr — stat box + IQ·DK·FD circles (halved inside .desktop-live-corner-grid)
      minmax(40px, auto) — K strip (taller than bare content, shorter than a full quarter)
    */
    .shell .cards .desktop-live-layout {
      grid-template-rows: minmax(0, 1fr) minmax(0, 1fr) minmax(0, 2fr) minmax(40px, auto);
      align-content: stretch;
      padding: 6px 8px 6px;
      gap: 4px;
      min-height: 0;
    }

    .shell .cards .desktop-live-header {
      height: 100%;
      min-height: 0;
      align-content: center;
      padding: 4px 4px 6px;
    }

    .shell .cards .desktop-live-matchup {
      height: 100%;
      min-height: 0;
      align-content: center;
      padding: 6px 0;
      column-gap: 8px;
      row-gap: 4px;
    }

    /* Quarter 3: upper half = stats, lower half = line chips (Safari-safe: keep this wrapper, no display:contents) */
    .shell .cards .desktop-live-corner-grid {
      display: grid;
      grid-template-rows: minmax(0, 1fr) minmax(0, 1fr);
      align-self: stretch;
      min-height: 0;
      height: 100%;
      width: 100%;
      gap: 4px;
    }

    .shell .cards .desktop-live-corner-grid > .desktop-live-stats.desktop-live-pitchiq-stats-columns {
      align-self: center;
      justify-self: stretch;
      width: 100%;
      min-height: 0;
      margin: 0;
    }

    .shell .cards .desktop-live-chip-bridge {
      display: flex;
      align-self: center;
      justify-content: center;
      justify-self: stretch;
      width: 100%;
      min-height: 0;
      margin: 0;
      padding: 2px 0 4px;
      align-items: center;
    }

    .shell .cards .desktop-live-pitchiq-stats-columns {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      column-gap: 10px;
      row-gap: 10px;
    }

    .shell .cards .desktop-live-sk-column,
    .shell .cards .desktop-live-stat-stack {
      gap: 8px;
    }

    .shell .cards .desktop-live-stats {
      padding: 8px 7px 6px;
      min-height: 0;
    }

    .shell .cards .desktop-live-stat-label {
      font-size: 0.56rem;
      letter-spacing: 0.05em;
    }

    .shell .cards .desktop-live-stat-value {
      font-size: 0.78rem;
      line-height: 1.12;
    }

    .shell .cards .desktop-live-notes-copy {
      font-size: 0.6rem;
      line-height: 1.2;
    }

    .shell .cards .desktop-live-line-chip {
      flex: 0 0 46px;
      width: 46px;
      height: 46px;
      min-width: 46px;
      padding: 3px 2px;
      gap: 2px;
    }

    .shell .cards .desktop-live-line-chip-label {
      font-size: calc(0.4rem + 1px);
      letter-spacing: 0.04em;
    }

    .shell .cards .desktop-live-line-chip-value {
      font-size: calc(0.62rem + 1px);
    }

    .shell .cards .desktop-live-line-chip-pitchiq,
    .shell .cards .desktop-live-line-chip-dk,
    .shell .cards .desktop-live-line-chip-fd {
      border-width: 3px;
      box-shadow:
        0 0 12px rgba(255, 210, 90, 0.32),
        0 0 18px rgba(255, 200, 70, 0.14);
    }

    .shell .cards .desktop-live-line-chip-dk {
      box-shadow: 0 0 12px rgba(92, 255, 119, 0.32);
    }

    .shell .cards .desktop-live-line-chip-fd {
      box-shadow: 0 0 12px rgba(35, 134, 235, 0.32);
    }

    .shell .cards .desktop-live-kpanel {
      width: 100%;
      align-self: stretch;
      min-height: 44px;
      box-sizing: border-box;
      padding: 4px 6px;
      --live-k-panel-pad-inline: 6px;
      overflow: hidden;
    }

    .shell .cards .desktop-live-dot-track {
      --live-dot-gap: 3px;
      --live-dot-size: 15px;
      max-height: 26px;
    }

    .shell .cards .desktop-live-dot-row {
      max-height: 26px;
      align-items: center;
    }

    .shell .cards .desktop-live-dot {
      width: 15px;
      height: 15px;
      min-width: 15px;
      min-height: 15px;
      max-width: 15px;
      max-height: 15px;
    }

    .shell .cards .desktop-live-dot-ball {
      width: 15px;
      height: 15px;
      max-width: 15px;
      max-height: 15px;
    }

    .shell .cards .desktop-live-dot-label {
      font-size: 0.4rem;
    }

    .shell .cards .desktop-card-note-title {
      font-size: 0.72rem;
    }

    .shell .cards .desktop-card-note-body {
      font-size: 0.65rem;
    }

    .empty {
      margin-top: 28px;
      padding: 22px 14px;
      border: 1px dashed rgba(255, 255, 255, 0.14);
      border-radius: 16px;
      color: var(--muted);
      text-align: center;
    }

    .lookup-note-list {
      display: grid;
      gap: 10px;
      padding-top: 0;
    }

    .lookup-note-heading {
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 950;
      letter-spacing: 0.16em;
      text-align: center;
      text-transform: uppercase;
      margin: 0 0 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .lookup-note-card {
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 14px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.045);
    }

    .lookup-note-card.up {
      border-color: rgba(255, 148, 46, 0.5);
      background: rgba(80, 47, 12, 0.38);
    }

    .lookup-note-card.down {
      border-color: rgba(86, 152, 255, 0.5);
      background: rgba(12, 34, 72, 0.42);
    }

    .lookup-note-card.neutral {
      border-color: rgba(210, 180, 140, 0.34);
      background: rgba(58, 45, 31, 0.34);
    }

    .lookup-note-title {
      color: var(--text);
      font-size: 0.92rem;
      font-weight: 900;
      line-height: 1.25;
      margin-bottom: 8px;
    }

    .lookup-note-k {
      color: var(--amber);
      margin-left: 5px;
    }

    .lookup-note-k.down {
      color: var(--blue);
    }

    .lookup-note-body {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 750;
      line-height: 1.45;
    }

    .lookup-note-body strong {
      color: #d5d9e1;
      font-weight: 950;
    }

    .footer {
      margin-top: 18px;
      color: rgba(246, 241, 232, 0.46);
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      text-align: center;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <audio id="card-flip-audio" src="sounds/cardflip.mp3" preload="auto"></audio>
  <main class="shell">
    <div class="topbar">
      <div class="brand-row">
        <h1 class="brand">pitchIQ</h1>
        <div class="top-actions">
          <button class="filter-toggle" id="filter-toggle" type="button" aria-expanded="true">Hide</button>
          <a class="desktop-link" href="./app.html?desktop=1">Desktop</a>
        </div>
      </div>
      <p class="account" id="account-pill">Checking session</p>
      <div class="controls">
        <input class="search" id="search-input" type="search" placeholder="Search pitcher, team, book, notes" autocomplete="off" />
        <div class="control-row">
          <div class="segmented" aria-label="Game view">
            <button class="tab active" type="button" data-view="upcoming">Upcoming</button>
            <button class="tab" type="button" data-view="live">Live</button>
          </div>
          <select class="sort" id="sort-select" aria-label="Sort cards">
            <option value="date-asc">Soonest</option>
            <option value="projected-desc">Proj K High</option>
            <option value="dk_edge-desc">DK Edge</option>
            <option value="fd_edge-desc">FD Edge</option>
            <option value="pitcher-asc">Pitcher A-Z</option>
          </select>
        </div>
      </div>
      <div class="meta">
        <span id="results-meta">Loading</span>
        <span id="refresh-meta">Pending</span>
      </div>
    </div>

    <section class="cards" id="cards"></section>
    <footer class="footer" id="server-activity-footer">last server activity: pending</footer>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    window.PITCHIQ_LIVE_K_RAIL = "2026-05-01-live-k-progress";
    const SUPABASE_URL = "https://odvopvoqssamjquinhft.supabase.co";
    const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_7g1yX__kNzT-6tj8Tr4SIg_T4BX9BlV";
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY, {
      auth: {
        autoRefreshToken: true,
        detectSessionInUrl: true,
        persistSession: true,
        storage: window.localStorage,
      },
    });

    const accountPill = document.getElementById("account-pill");
    const searchInput = document.getElementById("search-input");
    const sortSelect = document.getElementById("sort-select");
    const cardsContainer = document.getElementById("cards");
    const cardFlipAudioElement = document.getElementById("card-flip-audio");
    const ALLOWED_ACCOUNT_ROLES = ["basic", "pro", "life", "admin", "owner"];
    const resultsMeta = document.getElementById("results-meta");
    const refreshMeta = document.getElementById("refresh-meta");
    const serverActivityFooter = document.getElementById("server-activity-footer");
    const topbar = document.querySelector(".topbar");
    const filterToggle = document.getElementById("filter-toggle");
    const tabs = Array.from(document.querySelectorAll(".tab"));

    const DATA_REFRESH_INTERVAL_MS = 300000;
    const DATA_REFRESH_DEBOUNCE_MS = 5000;
    let authAccepted = false;
    let authRedirected = false;
    let authCheckId = 0;
    let activeView = "upcoming";
    let searchQuery = "";
    let controlsCollapsed = false;
    let upcomingGames = [];
    let liveGames = [];
    let gameHistory = [];
    let pitcherLookupByName = new Map();
    let historicalBetRecordCache = new Map();
    let currentUserRole = null;
    const flippedCardKeys = new Set();
    const cardFlipDirections = new Map();
    let dataRefreshIntervalId = null;
    let dataRefreshTimeoutId = null;
    let dataRefreshInFlight = false;
    let dataRefreshQueued = false;
    let dataRefreshChannel = null;
    const CARD_FLIP_SOUND_URL = new URL("sounds/cardflip.mp3", window.location.href).href;

    function playCardFlipSound() {
      try {
        const audio = cardFlipAudioElement || new Audio(CARD_FLIP_SOUND_URL);
        audio.preload = "auto";
        audio.volume = 0.85;
        audio.pause();
        audio.currentTime = 0;
        const playPromise = audio.play();
        if (playPromise && typeof playPromise.catch === "function") {
          playPromise.catch(() => {});
        }
      } catch (error) {
      }
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function normalizeText(value) {
      return String(value || "").trim().toLowerCase();
    }

    function setControlsCollapsed(value) {
      controlsCollapsed = Boolean(value);
      topbar.classList.toggle("controls-collapsed", controlsCollapsed);
      filterToggle.textContent = controlsCollapsed ? "Filters" : "Hide";
      filterToggle.setAttribute("aria-expanded", String(!controlsCollapsed));
    }

    function formatNumber(value, digits = 2) {
      if (typeof value === "string" && !value.trim()) return "";
      if (value === null || value === undefined || Number.isNaN(Number(value))) return "";
      return Number(value).toFixed(digits);
    }

    function formatDisplayTime(value) {
      if (!value) return "";
      const parsed = new Date(value);
      if (Number.isNaN(parsed.getTime())) return String(value);
      return parsed.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" }).toLowerCase();
    }

    function formatServerActivity(value) {
      const parsed = new Date(value);
      if (Number.isNaN(parsed.getTime())) return "";
      const part = number => String(number).padStart(2, "0");
      return `${part(parsed.getHours())}:${part(parsed.getMinutes())} ${part(parsed.getMonth() + 1)}:${part(parsed.getDate())}:${parsed.getFullYear()}`;
    }

    function setServerActivity(value) {
      const formatted = formatServerActivity(value);
      serverActivityFooter.textContent = `last server activity: ${formatted || "pending"}`;
      refreshMeta.textContent = formatted ? `Updated ${formatted}` : "Pending";
    }

    function displayProjectionValue(game) {
      const projectionKeys = ["projected_strikeouts", "adjusted_EK_full", "adjusted_EK_hand", "ensemble_prediction"];
      for (const key of projectionKeys) {
        if (!(key in game)) continue;
        const value = game[key];
        if (typeof value === "string" && !value.trim()) continue;
        if (value === null || value === undefined || Number.isNaN(Number(value))) continue;
        return Number(value);
      }
      return null;
    }

    function sortableGameDate(game) {
      const parsed = Date.parse(game?.sort_datetime || game?.game_date_raw || game?.start_time || game?.date || "");
      return Number.isNaN(parsed) ? Number.POSITIVE_INFINITY : parsed;
    }

    function parseGameStartDate(game) {
      const candidates = [
        game?.sort_datetime,
        game?.start_time,
        game?.game_date_raw,
        [game?.date, game?.time].filter(Boolean).join(" "),
        game?.date,
      ].filter(value => String(value || "").trim());
      for (const value of candidates) {
        const parsed = new Date(value);
        if (!Number.isNaN(parsed.getTime())) return parsed;
      }
      return null;
    }

    function isClearlyCompletedGame(game) {
      const status = normalizeText(game?.game_status || game?.status || game?.abstract_game_state);
      return status.includes("final") || status.includes("completed") || status.includes("game over");
    }

    function isClearlyLiveGame(game) {
      const status = normalizeText(game?.game_status || game?.status || game?.abstract_game_state);
      return status.includes("live") || status.includes("in progress") || status.includes("middle") || status.includes("top ") || status.includes("bottom ");
    }

    function isClearlyUpcomingGame(game) {
      const status = normalizeText(game?.game_status || game?.status || game?.abstract_game_state);
      return status.includes("pre-game") || status.includes("scheduled") || status.includes("preview");
    }

    function shouldShowAsLiveGame(game, tableType) {
      if (isClearlyCompletedGame(game)) return false;
      if (isClearlyLiveGame(game) || tableType === "live") return true;
      const startDate = parseGameStartDate(game);
      if (!startDate) return false;
      const minutesSinceStart = (Date.now() - startDate.getTime()) / 60000;
      return minutesSinceStart >= 0 && minutesSinceStart <= 480;
    }

    function splitSupabaseGameRows(rows) {
      const upcomingByKey = new Map();
      const liveByKey = new Map();
      rows.forEach(row => {
        if (!row?.payload) return;
        const tableType = String(row.table_type || "").toLowerCase();
        const game = { ...row.payload };
        const rowKey = [
          game.event_key,
          game.pitcher,
          game.opponent,
          game.date || game.game_date,
          game.start_time,
        ].map(value => normalizeText(value)).join("|");
        if (shouldShowAsLiveGame(game, tableType)) {
          if (!game.game_status || isClearlyUpcomingGame(game)) game.game_status = "In Progress";
          liveByKey.set(rowKey, game);
          upcomingByKey.delete(rowKey);
          return;
        }
        if ((tableType === "upcoming" || !isClearlyCompletedGame(game)) && !liveByKey.has(rowKey)) {
          upcomingByKey.set(rowKey, game);
        }
      });
      const sortByStartTime = (left, right) => sortableGameDate(left) - sortableGameDate(right);
      return {
        upcoming: Array.from(upcomingByKey.values()).sort(sortByStartTime),
        live: Array.from(liveByKey.values()).sort(sortByStartTime),
      };
    }

    function leanClass(value) {
      const normalized = String(value || "").trim().toUpperCase();
      if (normalized === "OVER") return "over";
      if (normalized === "UNDER") return "under";
      if (normalized === "PASS" || normalized === "AVOID") return "avoid";
      return "";
    }

    function formatBetLabel(value) {
      if (String(value || "").trim().toUpperCase() === "PASS") return "Avoid";
      return value || "";
    }

    function edgeClass(value, betValue) {
      const normalizedBet = String(betValue || "").trim().toUpperCase();
      if (normalizedBet === "PASS" || normalizedBet === "AVOID") return "avoid";
      if (value === null || value === undefined || value === "" || Number.isNaN(Number(value))) return "";
      return Number(value) >= 0 ? "positive" : "negative";
    }

    function formatEdge(value) {
      if (value === null || value === undefined || value === "" || Number.isNaN(Number(value))) return "";
      const number = Number(value);
      return `${number >= 0 ? "+" : ""}${number.toFixed(2)}`;
    }

    function evaluateBetCorrectness(actualValue, lineValue, betValue) {
      const bet = String(betValue || "").trim().toUpperCase();
      const actual = Number(actualValue);
      const line = Number(lineValue);
      if (!["OVER", "UNDER"].includes(bet) || !Number.isFinite(actual) || !Number.isFinite(line)) return "";
      if (actual === line) return "Push";
      if (bet === "OVER") return actual > line ? "Win" : "Loss";
      return actual < line ? "Win" : "Loss";
    }

    function hasResolvedHistoricalStatus(game) {
      const status = normalizeText(game?.game_status || game?.status || game?.abstract_game_state);
      return !status || isClearlyCompletedGame(game);
    }

    function countHistoricalBetOutcome(record, outcome) {
      if (outcome === "Win") record.wins += 1;
      if (outcome === "Loss") record.losses += 1;
    }

    function historicalBetRecordForPitcher(pitcherName) {
      const normalizedPitcher = normalizeText(pitcherName);
      if (!normalizedPitcher) return { wins: 0, losses: 0 };
      if (historicalBetRecordCache.has(normalizedPitcher)) {
        return historicalBetRecordCache.get(normalizedPitcher);
      }

      const record = { wins: 0, losses: 0 };
      gameHistory.forEach(game => {
        if (normalizeText(game?.pitcher) !== normalizedPitcher) return;
        if (!hasResolvedHistoricalStatus(game)) return;
        if (!Number.isFinite(Number(displayProjectionValue(game)))) return;

        const actual = game.actual_k ?? game.strikeouts;
        countHistoricalBetOutcome(record, evaluateBetCorrectness(actual, game.dk_line, game.dk_bet));
        countHistoricalBetOutcome(record, evaluateBetCorrectness(actual, game.fd_line, game.fd_bet));
      });

      historicalBetRecordCache.set(normalizedPitcher, record);
      return record;
    }

    function renderHistoricalBetRecord(game) {
      const record = historicalBetRecordForPitcher(game?.pitcher);
      if (!record.wins && !record.losses) return "";
      return `
        <span title="Historical bet record">
          <span>(</span><span class="historical-record-win">${record.wins}</span><span>-</span><span class="historical-record-loss">${record.losses}</span><span>)</span>
        </span>
      `;
    }

    function renderCardHistoricalRecordLine(game) {
      const record = renderHistoricalBetRecord(game);
      if (!record) return "";
      return `<div class="card-record-line">IQ ${record}</div>`;
    }

    function recommendedSide(game) {
      const candidates = [
        game?.dk_bet,
        game?.fd_bet,
        game?.lean,
        game?.recommended_bet,
        game?.bet,
      ].map(value => String(value || "").trim().toUpperCase());
      return candidates.find(value => value === "OVER" || value === "UNDER") || "";
    }

    function lineDiscrepancyNote(game) {
      const dkLine = parseValidLine(game?.dk_line);
      const fdLine = parseValidLine(game?.fd_line);
      if (dkLine === null || fdLine === null || dkLine === fdLine) return "";
      const projected = displayProjectionValue(game);
      if (!Number.isFinite(Number(projected))) return "";

      if (Number(projected) < Math.min(dkLine, fdLine)) {
        return dkLine > fdLine ? "+DK Line" : "+FD Line";
      }
      if (Number(projected) > Math.max(dkLine, fdLine)) {
        return dkLine < fdLine ? "+DK Line" : "+FD Line";
      }
      return "";
    }

    function parseValidLine(value) {
      const normalized = String(value ?? "").trim().toLowerCase();
      if (!normalized || ["-", "pending", "unknown", "n/a", "na"].includes(normalized)) return null;
      const line = Number(value);
      return Number.isFinite(line) && line > 0 ? line : null;
    }

    function cleanLineNotes(game, notes) {
      const validLineNote = normalizeText(lineDiscrepancyNote(game));
      return String(notes || "")
        .split(/\s*(?:,|\|)\s*/)
        .map(note => note.trim())
        .filter(Boolean)
        .filter(note => {
          const normalized = normalizeText(note);
          if (normalized === "+dk line" || normalized === "+fd line") return normalized === validLineNote;
          return true;
        })
        .join(", ");
    }

    function displayNotes(game) {
      const rawNotes = cleanLineNotes(game, game?.notes);
      const discrepancyNote = lineDiscrepancyNote(game);
      if (!discrepancyNote || normalizeText(rawNotes).includes(normalizeText(discrepancyNote))) {
        return rawNotes;
      }
      return [discrepancyNote, rawNotes].filter(Boolean).join(" | ");
    }

    function lineDiscrepancyShimmerClass(game) {
      const notes = normalizeText(displayNotes(game));
      if (notes.includes("+dk line")) return "dk-shimmer";
      if (notes.includes("+fd line")) return "fd-shimmer";
      return "";
    }

    function formatLineOdds(lineValue, overPayout, underPayout) {
      const line = String(lineValue || "").trim();
      const over = String(overPayout || "").trim();
      const under = String(underPayout || "").trim();
      return {
        line: line || "-",
        odds: over || under ? `${over || "-"} / ${under || "-"}` : "",
      };
    }

    function formatGameDate(game) {
      const rawDate = String(game?.date || "").trim();
      const parsed = new Date(game?.sort_datetime || game?.game_date_raw || game?.start_time || rawDate);
      if (Number.isNaN(parsed.getTime())) return rawDate;
      return parsed.toLocaleDateString([], { month: "2-digit", day: "2-digit", year: "numeric" });
    }

    function volatilityClass(value) {
      const normalized = normalizeText(value);
      if (normalized === "low") return "vol-low";
      if (normalized === "medium") return "vol-medium";
      if (normalized === "high") return "vol-high";
      return "";
    }

    function formatUmpire(value) {
      const umpire = String(value || "").trim();
      if (!umpire || ["pending", "unknown", "n/a", "na"].includes(normalizeText(umpire))) {
        return "Pending";
      }
      return umpire;
    }

    function renderBookMetric(label, lineValue, overPayout, underPayout, betValue, edgeValue) {
      const book = formatLineOdds(lineValue, overPayout, underPayout);
      const edgeText = formatEdge(edgeValue) || "Edge pending";
      return `
        <div class="metric-row">
          <div class="metric-label">
            ${escapeHtml(label)}
            <span class="metric-context ${edgeClass(edgeValue, betValue)}">${escapeHtml(edgeText)}</span>
          </div>
          <div class="metric-value">
            ${escapeHtml(book.line)}
            <div class="metric-subvalue">
              <span class="over">${escapeHtml(String(overPayout || "-"))}</span>
              <span>/</span>
              <span class="under">${escapeHtml(String(underPayout || "-"))}</span>
            </div>
          </div>
        </div>
      `;
    }

    function renderSimpleMetric(label, value, className = "", context = "", labelClass = "") {
      return `
        <div class="metric-row">
          <div class="metric-label ${labelClass}">
            ${escapeHtml(label)}
            ${context ? `<span class="metric-context">${escapeHtml(context)}</span>` : ""}
          </div>
          <div class="metric-value ${className}">${escapeHtml(value || "-")}</div>
        </div>
      `;
    }

    function renderVixMetric(label, score) {
      const displayLabel = String(label || "").trim() || "-";
      const displayScore = String(score || "").trim();
      return `
        <div class="metric-row vix-row">
          <div class="metric-label">Vix${displayScore ? `: ${escapeHtml(displayScore)}` : ""}</div>
          <div class="metric-value ${volatilityClass(displayLabel)}">${escapeHtml(displayLabel)}</div>
        </div>
      `;
    }

    function renderEdgeMetric(game) {
      return `
        <div class="metric-row edge-row">
          <div class="metric-label">Edge</div>
          <div class="edge-value edge-dk ${edgeClass(game.dk_edge, game.dk_bet)}">DK ${escapeHtml(formatEdge(game.dk_edge) || "-")}</div>
          <div class="edge-value edge-fd ${edgeClass(game.fd_edge, game.fd_bet)}">FD ${escapeHtml(formatEdge(game.fd_edge) || "-")}</div>
        </div>
      `;
    }

    function renderNotesMetric(notes) {
      return `
        <div class="metric-row note-row">
          <div class="note-value">${escapeHtml(notes || " ")}</div>
        </div>
      `;
    }

    function noteTagLabel(impact) {
      if (impact === "up") return "Raises Ks";
      if (impact === "down") return "Lowers Ks";
      return "Informative";
    }

    function noteImpactSuffix(impact) {
      if (impact === "up") return { text: "+K", className: "" };
      if (impact === "down") return { text: "-K", className: "down" };
      return { text: "", className: "" };
    }

    function sanitizeNoteBody(value, title = "") {
      let html = escapeHtml(value || "")
        .replace(/&lt;strong&gt;/g, "<strong>")
        .replace(/&lt;\/strong&gt;/g, "</strong>");
      html = html.replace(/\b(DraftKings|FanDuel)\b/g, "<strong>$1</strong>");
      if (normalizeText(title).includes("umpire")) {
        html = html.replace(/^([A-Z][^<.]*?)(?= (?:has|is) )/, match => {
          if (normalizeText(match).startsWith("the ")) return match;
          return `<strong>${match}</strong>`;
        });
      }
      return html;
    }

    function noteFromText(value) {
      const text = String(value || "").trim();
      if (!text) return null;
      return {
        title: "Game Notes",
        body: text,
        impact: "neutral"
      };
    }

    function lookupNotesForGame(game, fallbackNotes) {
      const lookup = pitcherLookupByName.get(String(game.pitcher || "").trim().toLowerCase()) || {};
      const payload = lookup.payload || {};
      const upcomingGame = payload.upcoming_game || payload.live_game || {};
      const noteSources = [
        game.upcoming_notes,
        upcomingGame.upcoming_notes,
        payload.upcoming_notes
      ];
      for (const source of noteSources) {
        if (Array.isArray(source) && source.length) {
          return source.map(note => ({
            title: String(note.title || "Game Notes").trim(),
            body: String(note.body || "").trim(),
            impact: ["up", "down", "neutral"].includes(String(note.impact || "")) ? note.impact : "neutral"
          })).filter(note => note.body || note.title);
        }
      }
      return String(fallbackNotes || "")
        .split("|")
        .map(noteFromText)
        .filter(Boolean);
    }

    function fitMobileLookupNotes(notes, maxNotes = 5) {
      const directional = notes.filter(note => note.impact === "up" || note.impact === "down");
      let informative = notes.filter(note => note.impact !== "up" && note.impact !== "down");

      if (directional.length + informative.length > maxNotes) {
        informative = informative.filter(note => normalizeText(note.title) !== "umpire pending");
      }

      while (directional.length + informative.length > maxNotes && informative.length) {
        informative.pop();
      }

      return [...directional, ...informative];
    }

    function renderLookupNotes(game, fallbackNotes) {
      const notes = fitMobileLookupNotes(lookupNotesForGame(game, fallbackNotes));
      if (!notes.length) {
        notes.push({
          title: "No Major Flags",
          body: "No strong context edges are standing out for this upcoming projection yet.",
          impact: "neutral"
        });
      }
      return `
        <div class="lookup-note-heading">Upcoming Game Notes</div>
        <div class="lookup-note-list">
          ${notes.map(note => {
            const suffix = noteImpactSuffix(note.impact);
            return `
            <div class="lookup-note-card ${escapeHtml(note.impact)}">
              <div class="lookup-note-title">
                ${escapeHtml(note.title)}
                ${suffix.text ? `<span class="lookup-note-k ${suffix.className}">${suffix.text}</span>` : ""}
              </div>
              <div class="lookup-note-body">${sanitizeNoteBody(note.body, note.title)}</div>
            </div>
          `;
          }).join("")}
        </div>
      `;
    }

    function cardKey(game) {
      return [
        activeView,
        game?.event_key || "",
        game?.pitcher || "",
        game?.date || "",
        game?.opponent || ""
      ].map(value => String(value || "").trim()).join("|");
    }

    function renderLookupBack(game, projected, date, time, volatilityLabel, volatilityScore, notes) {
      return renderLookupNotes(game, notes);
    }

    function cardSearchText(game) {
      return [
        game.pitcher,
        game.pitcher_team,
        game.opponent,
        game.date,
        game.time,
        game.game_status,
        game.plate_umpire,
        game.dk_line,
        game.fd_line,
        game.dk_bet,
        game.fd_bet,
        displayNotes(game),
      ].map(normalizeText).join(" ");
    }

    function pitcherNameSizeClass(name) {
      const length = String(name || "").trim().length;
      if (length >= 27) return " extra-long-name";
      if (length >= 23) return " very-long-name";
      if (length >= 18) return " long-name";
      if (length >= 14) return " medium-name";
      return "";
    }

    function filteredSortedGames() {
      const query = normalizeText(searchQuery);
      const source = activeView === "live" ? liveGames : upcomingGames;
      const filtered = query ? source.filter(game => cardSearchText(game).includes(query)) : source.slice();
      const [key, direction] = sortSelect.value.split("-");
      const multiplier = direction === "desc" ? -1 : 1;
      return filtered.sort((left, right) => {
        let a;
        let b;
        if (key === "projected") {
          a = displayProjectionValue(left) ?? Number.NEGATIVE_INFINITY;
          b = displayProjectionValue(right) ?? Number.NEGATIVE_INFINITY;
        } else if (key === "dk_edge" || key === "fd_edge") {
          a = Number(left[key] ?? Number.NEGATIVE_INFINITY);
          b = Number(right[key] ?? Number.NEGATIVE_INFINITY);
        } else if (key === "pitcher") {
          a = normalizeText(left.pitcher);
          b = normalizeText(right.pitcher);
        } else {
          a = sortableGameDate(left);
          b = sortableGameDate(right);
        }
        if (a < b) return -1 * multiplier;
        if (a > b) return 1 * multiplier;
        return normalizeText(left.pitcher).localeCompare(normalizeText(right.pitcher));
      });
    }

    function liveStrikeoutValue(game) {
      const value = game?.live_strikeouts ?? game?.live_ks ?? game?.starter_strikeouts;
      if (value === null || value === undefined || value === "") return "";
      const numeric = Number(value);
      return Number.isFinite(numeric) ? String(Math.trunc(numeric)) : String(value).trim();
    }

    function clampPercent(value) {
      if (!Number.isFinite(value)) return 0;
      return Math.max(0, Math.min(100, value));
    }

    function canUseProFeatures() {
      return ["pro", "life", "admin", "owner"].includes(String(currentUserRole || "").toLowerCase());
    }

    function canViewHistoricalGames() {
      return canUseProFeatures();
    }

    function displayNotesText(game) {
      return displayNotes(game);
    }

    function formatDisplayDate(value) {
      const raw = String(value || "").trim();
      if (!raw) return "";
      const match = raw.match(/^(\d{4})-(\d{2})-(\d{2})/);
      if (match) {
        return `${match[2]}/${match[3]}/${match[1]}`;
      }
      return raw;
    }

    function formatUmpireForCard(value) {
      const umpire = String(value || "").trim();
      if (!umpire || ["pending", "unknown", "n/a", "na"].includes(normalizeText(umpire))) {
        return "Pending";
      }
      return umpire;
    }

    function isAssignedUmp(value) {
      const normalized = String(value || "").trim().toLowerCase();
      return Boolean(normalized && !["pending", "unknown", "n/a", "na"].includes(normalized));
    }

    function isAvoidBet(value) {
      const normalized = String(value || "").trim().toUpperCase();
      return normalized === "PASS" || normalized === "AVOID";
    }

    function edgeTone(value, betValue) {
      if (isAvoidBet(betValue)) return "avoid-text";
      const side = String(betValue || "").trim().toUpperCase();
      if (side === "OVER") return "up-text";
      if (side === "UNDER") return "down-text";
      if (value === null || value === undefined || value === "" || Number.isNaN(Number(value))) return "";
      return Number(value) >= 0 ? "up-text" : "down-text";
    }

    function volatilityTone(label) {
      if (label === "Low") return "volatility-low";
      if (label === "Medium") return "volatility-medium";
      if (label === "High") return "volatility-high";
      return "";
    }

    function sanitizeNoteHtml(value, title = "") {
      return sanitizeNoteBody(value, title);
    }

    function dedupeNotes(notes) {
      const seen = new Set();
      return (Array.isArray(notes) ? notes : []).filter(note => {
        const key = [
          normalizeText(note?.title),
          normalizeText(note?.body),
          normalizeText(note?.impact)
        ].join("|");
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }

    function notesFromGame(game) {
      if (Array.isArray(game.upcoming_notes) && game.upcoming_notes.length) {
        return dedupeNotes(game.upcoming_notes);
      }

      const notes = [];
      const projected = displayProjectionValue(game);
      const bestEdge = Math.max(Number(game.dk_edge) || 0, Number(game.fd_edge) || 0);
      if (bestEdge >= 1) {
        notes.push({
          impact: "up",
          title: "Edge Showing",
          body: `The board is showing at least a +${formatNumber(bestEdge, 2)} edge against one available sportsbook line.`
        });
      }
      if (isAssignedUmp(game.plate_umpire)) {
        notes.push({
          impact: "neutral",
          title: "Umpire Assigned",
          body: `${game.plate_umpire} is listed behind the plate for this matchup.`
        });
      }
      if (game.weather || game.wind) {
        notes.push({
          impact: "neutral",
          title: "Game Context",
          body: [game.weather, game.temperature ? `${game.temperature}F` : "", game.wind].filter(Boolean).join(", ")
        });
      }
      const displayNotesMerged = displayNotesText(game);
      if (!notes.length && displayNotesMerged) {
        notes.push({ impact: "neutral", title: "Notes", body: displayNotesMerged });
      }
      if (!notes.length && Number.isFinite(Number(projected))) {
        notes.push({
          impact: "neutral",
          title: "Projection Ready",
          body: `${game.pitcher} is projected for ${formatNumber(projected, 2)} strikeouts.`
        });
      }
      return notes;
    }

    function displaySystemNotesText(game) {
      const notes = displayNotesText(game)
        .split(/\s*(?:,|\|)\s*/)
        .map(note => note.trim())
        .filter(Boolean)
        .filter(note => normalizeText(note) !== "no major flags");
      return notes.join(", ");
    }

    function fitDesktopLookupNotes(notes, maxNotes = 4) {
      const directional = notes.filter(note => note.impact === "up" || note.impact === "down");
      let informative = notes.filter(note => note.impact !== "up" && note.impact !== "down");

      if (directional.length + informative.length > maxNotes) {
        informative = informative.filter(note => normalizeText(note.title) !== "umpire pending");
      }

      while (directional.length + informative.length > maxNotes && informative.length) {
        informative.pop();
      }

      return [...directional, ...informative];
    }

    function renderDesktopFrontNotesRow(game) {
      const notes = displaySystemNotesText(game);
      return `
        <div class="desktop-live-notes-row">
          <div class="desktop-live-notes-copy">${escapeHtml(notes)}</div>
        </div>
      `;
    }

    function renderDesktopLookupNotes(game) {
      const notes = fitDesktopLookupNotes(dedupeNotes(notesFromGame(game)));
      if (!notes.length) {
        return `
          <div class="desktop-card-note-card neutral">
            <div class="desktop-card-note-title">No Major Flags</div>
            <div class="desktop-card-note-body">No strong context edges are standing out for this projection yet.</div>
          </div>
        `;
      }
      return notes.map(note => {
        const suffix = noteImpactSuffix(note.impact);
        return `
          <div class="desktop-card-note-card ${escapeHtml(note.impact || "neutral")}">
            <div class="desktop-card-note-title">
              ${escapeHtml(note.title || "")}
              ${suffix.text ? `<span class="desktop-card-note-k ${suffix.className}">${suffix.text}</span>` : ""}
            </div>
            <div class="desktop-card-note-body">${sanitizeNoteHtml(note.body || "", note.title || "")}</div>
          </div>
        `;
      }).join("");
    }

    function renderDesktopHistoricalAction(game) {
      const pitcher = escapeHtml(game?.pitcher || "");
      const historicalUnlocked = canViewHistoricalGames();
      const historicalTitle = historicalUnlocked
        ? "View historical games"
        : "Historical lookup is a Pro feature";
      const historicalIcon = historicalUnlocked
        ? '<svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v5h5"/><path d="M12 7v5l3 2"/></svg>'
        : "&#128274;";
      return `

    function desktopFormatLineOdds(lineValue, overPayout, underPayout) {
      const line = String(lineValue || "").trim();
      const over = String(overPayout || "").trim();
      const under = String(underPayout || "").trim();
      return {
        line: line || "-",
        over: over || "-",
        under: under || "-",
        odds: over || under ? `${over || "-"} / ${under || "-"}` : "",
      };
    }

    function desktopLineDiscrepancyShimmerClass(game) {
      return lineDiscrepancyShimmerClass(game);
    }

    const LIVE_K_DOT_COUNT = 10;
    const LIVE_K_DOT_GAP_PX = 3;

    function liveKLineBoundarySlot(line) {
      if (line === null || line === undefined || !Number.isFinite(line) || line <= 0) return null;
      const gapAfterBall = Math.round(line - 0.5);
      return Math.min(LIVE_K_DOT_COUNT - 1, Math.max(1, gapAfterBall));
    }

    function liveKLineMarkerLeftCalc(boundarySlot) {
      const g = LIVE_K_DOT_GAP_PX;
      const n = LIVE_K_DOT_COUNT;
      return `calc(${boundarySlot} * (100% - ${(n - 1) * g}px) / ${n} + ${(boundarySlot - 1) * g}px + ${g / 2}px)`;
    }

    function renderDesktopLiveKLineMarkers(game) {
      const dkLine = parseValidLine(game?.dk_line);
      const fdLine = parseValidLine(game?.fd_line);
      const dkSlot = liveKLineBoundarySlot(dkLine);
      const fdSlot = liveKLineBoundarySlot(fdLine);
      if (dkSlot === null && fdSlot === null) return "";

      const sameBookLine =
        dkLine !== null &&
        fdLine !== null &&
        Math.abs(dkLine - fdLine) < 1e-9 &&
        dkSlot !== null &&
        dkSlot === fdSlot;

      if (sameBookLine) {
        const left = liveKLineMarkerLeftCalc(dkSlot);
        const title = `DraftKings & FanDuel line ${escapeHtml(String(dkLine))}`;
        return `<span class="desktop-live-line desktop-live-line-book-split" style="left:${left};" title="${title}"></span>`;
      }

      const parts = [];
      if (dkSlot !== null) {
        parts.push(
          `<span class="desktop-live-line desktop-live-line-dk" style="left:${liveKLineMarkerLeftCalc(dkSlot)};" title="DraftKings line ${escapeHtml(String(dkLine))}"></span>`
        );
      }
      if (fdSlot !== null) {
        parts.push(
          `<span class="desktop-live-line desktop-live-line-fd" style="left:${liveKLineMarkerLeftCalc(fdSlot)};" title="FanDuel line ${escapeHtml(String(fdLine))}"></span>`
        );
      }
      return parts.join("");
    }

    function desktopLiveBaseballSvg() {
      return `<svg class="desktop-live-dot-ball" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
        <circle cx="16" cy="16" r="14.35" fill="#ffffff" stroke="rgba(28,29,34,0.5)" stroke-width="0.75"/>
        <path d="M5.86 5.86Q12.15 16 5.86 26.14" fill="none" stroke="#b81d25" stroke-width="1" stroke-linecap="round"/>
        <path d="M26.14 5.86Q19.85 16 26.14 26.14" fill="none" stroke="#b81d25" stroke-width="1" stroke-linecap="round"/>
      </svg>`;
    }

    function renderDesktopLiveKDots(liveKs) {
      const resolvedLiveKs = Number.isFinite(Number(liveKs)) ? Number(liveKs) : 0;
      const ball = desktopLiveBaseballSvg();
      return Array.from({ length: LIVE_K_DOT_COUNT }, (_, index) => {
        const dotValue = index + 1;
        const classes = [
          "desktop-live-dot",
          resolvedLiveKs >= dotValue ? "filled" : "",
        ].filter(Boolean).join(" ");
        return `<span class="desktop-live-dot-cell"><span class="${classes}">${ball}<span class="desktop-live-dot-label" aria-hidden="true">${dotValue}</span></span></span>`;
      }).join("");
    }

    function renderMobileDesktopGameCard(game, view, key, flipDirection, isFlipped) {
      const projectedValue = displayProjectionValue(game);
      const projected =
        projectedValue == null || !Number.isFinite(projectedValue)
          ? "-"
          : formatNumber(projectedValue, 2) || "-";
      const time = String(game.time || formatDisplayTime(game.start_time) || "").trim();
      const date = String(game.date || formatDisplayDate(game.game_date_raw) || "").trim();
      const currentPitcherId = String(game.current_pitcher_id ?? "").trim();
      const starterPitcherId = String(game.mlb_pitcher_id ?? game.pitcher_id ?? "").trim();
      const currentPitcherName = normalizeText(game.current_pitcher);
      const starterPitcherName = normalizeText(game.pitcher);
      const isCurrentStarter = Boolean(
        (currentPitcherId && starterPitcherId && currentPitcherId === starterPitcherId)
        || (currentPitcherName && starterPitcherName && currentPitcherName === starterPitcherName)
      );
      const starterStatus = isCurrentStarter ? "Pitching" : String(game.starter_status || "").trim();
      const matchupStatusLeft =
        view === "live"
          ? escapeHtml(starterStatus || game.game_status || "In Progress")
          : escapeHtml(`Ump: ${formatUmpireForCard(game.plate_umpire)}`);
      const dkBook = desktopFormatLineOdds(game.dk_line, game.dk_over_payout, game.dk_under_payout);
      const fdBook = desktopFormatLineOdds(game.fd_line, game.fd_over_payout, game.fd_under_payout);
      const strikeouts = liveStrikeoutValue(game);
      const displayStrikeouts = strikeouts || "0";
      return `
        <article class="desktop-card live ${desktopLineDiscrepancyShimmerClass(game)} ${flipDirection} ${isFlipped ? "flipped" : ""}" data-card-key="${escapeHtml(key)}" role="button" tabindex="0" aria-label="${isFlipped ? "Flip card back to projection" : "Flip card to game notes"}" title="${isFlipped ? "Flip back" : "Game notes"}">
          <div class="desktop-card-shell">
            <div class="desktop-card-face desktop-card-front">
              ${renderDesktopHistoricalAction(game)}
              <div class="desktop-live-watermark" aria-hidden="true">
                <img src="images/pitchIQ%20Logo%20v4.png" alt="" />
              </div>
              <div class="desktop-live-layout">
                <div class="desktop-live-header">
                  <h2 class="desktop-live-name${pitcherNameSizeClass(game.pitcher)}">${escapeHtml(game.pitcher || "Unknown")}</h2>
                  <div class="desktop-live-team">${escapeHtml(game.pitcher_team || "Team pending")}</div>
                </div>
                <div class="desktop-live-matchup">
                  <div class="desktop-live-opponent"><span class="desktop-live-matchup-vs">vs</span>${escapeHtml(game.opponent || "Opponent pending")}</div>
                  <span class="desktop-live-date">${escapeHtml(date || "Date pending")}</span>
                  <div class="desktop-live-status">${matchupStatusLeft}</div>
                  <span class="desktop-live-time">${escapeHtml(time === "Pending" ? "" : time)}</span>
                </div>
                <div class="desktop-live-corner-grid">
                  <div class="desktop-live-stats desktop-live-pitchiq-stats-columns">
                    <div class="desktop-live-sk-column">
                      <div class="desktop-live-stat-stack">
                        <div class="desktop-live-stat">
                          <span class="desktop-live-stat-label">DK Under</span>
                          <span class="desktop-live-stat-value desktop-live-stat-blue">${escapeHtml(dkBook.under)}</span>
                        </div>
                        <div class="desktop-live-stat">
                          <span class="desktop-live-stat-label">FD Under</span>
                          <span class="desktop-live-stat-value desktop-live-stat-blue">${escapeHtml(fdBook.under)}</span>
                        </div>
                      </div>
                    </div>
                    <div class="desktop-live-sk-column">
                      <div class="desktop-live-stat-stack">
                        <div class="desktop-live-stat">
                          <span class="desktop-live-stat-label">DK Over</span>
                          <span class="desktop-live-stat-value desktop-live-stat-orange">${escapeHtml(dkBook.over)}</span>
                        </div>
                        <div class="desktop-live-stat">
                          <span class="desktop-live-stat-label">FD Over</span>
                          <span class="desktop-live-stat-value desktop-live-stat-orange">${escapeHtml(fdBook.over)}</span>
                        </div>
                      </div>
                    </div>
                    <div class="desktop-live-sk-column">
                      <div class="desktop-live-stat-stack">
                        <div class="desktop-live-stat">
                          <span class="desktop-live-stat-label">DK Edge</span>
                          <span class="desktop-live-stat-value ${edgeTone(game.dk_edge, game.dk_bet)}">${escapeHtml(formatEdge(game.dk_edge) || "-")}</span>
                        </div>
                        <div class="desktop-live-stat">
                          <span class="desktop-live-stat-label">FD Edge</span>
                          <span class="desktop-live-stat-value ${edgeTone(game.fd_edge, game.fd_bet)}">${escapeHtml(formatEdge(game.fd_edge) || "-")}</span>
                        </div>
                      </div>
                    </div>
                    ${renderDesktopFrontNotesRow(game)}
                  </div>
                  <div class="desktop-live-chip-bridge">
                    <div class="desktop-live-chip-row">
                      <div class="desktop-live-line-chip desktop-live-line-chip-pitchiq" title="pitchIQ projected K">
                        <span class="desktop-live-line-chip-label">IQ</span>
                        <span class="desktop-live-line-chip-value">${escapeHtml(projected)}</span>
                      </div>
                      <div class="desktop-live-line-chip desktop-live-line-chip-dk" title="DraftKings line">
                        <span class="desktop-live-line-chip-label">DK</span>
                        <span class="desktop-live-line-chip-value">${escapeHtml(dkBook.line)}</span>
                      </div>
                      <div class="desktop-live-line-chip desktop-live-line-chip-fd" title="FanDuel line">
                        <span class="desktop-live-line-chip-label">FD</span>
                        <span class="desktop-live-line-chip-value">${escapeHtml(fdBook.line)}</span>
                      </div>
                    </div>
                  </div>
                </div>
                <div class="desktop-live-kpanel">
                  <div class="desktop-live-line-layer" aria-hidden="true">
                    ${renderDesktopLiveKLineMarkers(game)}
                  </div>
                  <div class="desktop-live-dot-track">
                    <div class="desktop-live-dot-row">
                      ${renderDesktopLiveKDots(displayStrikeouts)}
                    </div>
                  </div>
                </div>
              </div>
            </div>
            <div class="desktop-card-face desktop-card-back">
              <div class="desktop-card-inner">
                <div class="desktop-card-notes-list">
                  ${renderDesktopLookupNotes(game)}
                </div>
              </div>
            </div>
          </div>
        </article>
      `;
    }

    function renderCards() {
      const games = filteredSortedGames();
      const total = activeView === "live" ? liveGames.length : upcomingGames.length;
      resultsMeta.textContent = `${games.length} of ${total} ${activeView}`;
      if (!games.length) {
        cardsContainer.innerHTML = '<div class="empty">No matching pitcher cards right now.</div>';
        return;
      }

      cardsContainer.innerHTML = games.map(game => {
        const key = cardKey(game);
        const flipDirection = cardFlipDirections.get(key) === "left" ? "flip-left" : "flip-right";
        const isFlipped = flippedCardKeys.has(key);
        return renderMobileDesktopGameCard(game, activeView, key, flipDirection, isFlipped);
      }).join("");
    }

    async function getUserRole(userId) {
      const { data, error } = await supabaseClient
        .from("profiles")
        .select("role")
        .eq("user_id", userId)
        .single();
      if (error) return { role: null, error };
      return { role: data?.role || null, error: null };
    }

    function setAccountIdentity(session) {
      const user = session?.user;
      const username = user?.user_metadata?.username;
      const identityLabel = String(username || user?.email || "Unknown user").trim();
      accountPill.textContent = `Welcome, ${identityLabel}!`;
    }

    function redirectToLogin() {
      if (authAccepted || authRedirected) return;
      authRedirected = true;
      window.location.replace("./login.html");
    }

    async function acceptSession(session) {
      if (!session || authAccepted || authRedirected) return;
      const checkId = ++authCheckId;
      const { role, error } = await getUserRole(session.user.id);
      if (checkId !== authCheckId || authAccepted || authRedirected) return;
      if (error) {
        window.clearTimeout(authTimeout);
        return;
      }
      if (!ALLOWED_ACCOUNT_ROLES.includes(role)) {
        await supabaseClient.auth.signOut();
        redirectToLogin();
        return;
      }
      authAccepted = true;
      currentUserRole = role || null;
      setAccountIdentity(session);
      refreshSupabaseData();
      startSupabaseAutoRefresh();
    }

    async function loadSupabaseTables() {
      const [
        { data: gameRows, error },
        { data: lookupRows, error: lookupError },
        { data: historyRows, error: historyError }
      ] = await Promise.all([
        supabaseClient
          .from("pitchiq_game_rows")
          .select("table_type,payload,updated_at")
          .order("updated_at", { ascending: false }),
        supabaseClient
          .from("pitchiq_pitcher_lookup")
          .select("pitcher,payload,updated_at")
          .order("updated_at", { ascending: false }),
        supabaseClient
          .from("pitchiq_historical_rows")
          .select("payload,updated_at")
          .order("updated_at", { ascending: false })
          .limit(2000)
      ]);
      if (error) {
        renderCards();
        return;
      }
      if (!lookupError) {
        pitcherLookupByName = new Map(
          (lookupRows || [])
            .filter(row => String(row.pitcher || "").trim())
            .map(row => [String(row.pitcher || "").trim().toLowerCase(), row])
        );
      }
      if (!historyError) {
        gameHistory = (historyRows || [])
          .filter(row => row.payload)
          .map(row => row.payload);
        historicalBetRecordCache = new Map();
      }
      const splitGames = splitSupabaseGameRows(gameRows || []);
      upcomingGames = splitGames.upcoming;
      liveGames = splitGames.live;
      renderCards();
    }

    function latestTimestamp(values) {
      return values
        .filter(Boolean)
        .map(value => new Date(value))
        .filter(value => !Number.isNaN(value.getTime()))
        .sort((left, right) => right.getTime() - left.getTime())[0] || null;
    }

    async function loadLatestTableUpdate(tableName) {
      const { data, error } = await supabaseClient
        .from(tableName)
        .select("updated_at")
        .order("updated_at", { ascending: false })
        .limit(1);
      if (error) return null;
      return data?.[0]?.updated_at || null;
    }

    async function loadServerActivity() {
      const { data, error } = await supabaseClient
        .from("pitchiq_server_activity")
        .select("last_activity_at")
        .eq("id", "worker")
        .maybeSingle();
      const [latestGameRowsUpdate, latestHistoryRowsUpdate, latestLookupUpdate] = await Promise.all([
        loadLatestTableUpdate("pitchiq_game_rows"),
        loadLatestTableUpdate("pitchiq_historical_rows"),
        loadLatestTableUpdate("pitchiq_pitcher_lookup"),
      ]);
      setServerActivity(latestTimestamp([
        !error ? data?.last_activity_at : null,
        latestGameRowsUpdate,
        latestHistoryRowsUpdate,
        latestLookupUpdate,
      ]));
    }

    function queueSupabaseRefresh() {
      window.clearTimeout(dataRefreshTimeoutId);
      dataRefreshTimeoutId = window.setTimeout(() => {
        if (document.hidden) {
          dataRefreshQueued = true;
          return;
        }
        refreshSupabaseData();
      }, DATA_REFRESH_DEBOUNCE_MS);
    }

    async function refreshSupabaseData() {
      if (dataRefreshInFlight) {
        dataRefreshQueued = true;
        return;
      }
      dataRefreshInFlight = true;
      try {
        await loadSupabaseTables();
        await loadServerActivity();
      } finally {
        dataRefreshInFlight = false;
        if (dataRefreshQueued) {
          dataRefreshQueued = false;
          queueSupabaseRefresh();
        }
      }
    }

    function startSupabaseAutoRefresh() {
      if (!dataRefreshIntervalId) {
        dataRefreshIntervalId = window.setInterval(() => {
          if (document.hidden) {
            dataRefreshQueued = true;
            return;
          }
          refreshSupabaseData();
        }, DATA_REFRESH_INTERVAL_MS);
      }
      if (dataRefreshChannel) return;
      dataRefreshChannel = supabaseClient
        .channel("pitchiq-mobile-card-refresh")
        .on("postgres_changes", { event: "*", schema: "public", table: "pitchiq_game_rows" }, queueSupabaseRefresh)
        .on("postgres_changes", { event: "*", schema: "public", table: "pitchiq_historical_rows" }, queueSupabaseRefresh)
        .on("postgres_changes", { event: "*", schema: "public", table: "pitchiq_pitcher_lookup" }, queueSupabaseRefresh)
        .on("postgres_changes", { event: "*", schema: "public", table: "pitchiq_server_activity" }, queueSupabaseRefresh)
        .subscribe();
    }

    const authTimeout = window.setTimeout(redirectToLogin, 8000);

    supabaseClient.auth.onAuthStateChange((event, session) => {
      if (session) {
        window.clearTimeout(authTimeout);
        acceptSession(session);
        return;
      }
      if (event === "SIGNED_OUT" && !authAccepted) {
        window.clearTimeout(authTimeout);
        redirectToLogin();
      }
    });

    supabaseClient.auth.getSession().then(({ data, error }) => {
      if (error) {
        window.clearTimeout(authTimeout);
        redirectToLogin();
        return;
      }
      if (data.session) {
        window.clearTimeout(authTimeout);
        acceptSession(data.session);
      }
    });

    tabs.forEach(tab => {
      tab.addEventListener("click", () => {
        activeView = tab.dataset.view || "upcoming";
        tabs.forEach(item => item.classList.toggle("active", item === tab));
        renderCards();
      });
    });

    cardsContainer.addEventListener("pointerdown", event => {
      if (!event.target.closest(".desktop-card")) return;
      playCardFlipSound();
    });

    function flipCardFromPoint(card, clientX) {
      const key = card?.dataset.cardKey;
      if (!key) return;
      const bounds = card.getBoundingClientRect();
      const direction = clientX < bounds.left + bounds.width / 2 ? "left" : "right";
      cardFlipDirections.set(key, direction);
      card.classList.toggle("flip-left", direction === "left");
      card.classList.toggle("flip-right", direction === "right");
      if (flippedCardKeys.has(key)) {
        flippedCardKeys.delete(key);
        card.classList.remove("flipped");
      } else {
        flippedCardKeys.add(key);
        card.classList.add("flipped");
      }
      const isFlipped = flippedCardKeys.has(key);
      card.setAttribute("aria-label", isFlipped ? "Flip card back to projection" : "Flip card to game notes");
      card.title = isFlipped ? "Flip back" : "Game notes";
    }

    cardsContainer.addEventListener("click", event => {
      const historicalButton = event.target.closest(".historical-lookup-btn");
      if (historicalButton) {
        event.stopPropagation();
        const pitcher = historicalButton.dataset.pitcher || "";
        if (pitcher) {
          const dest = new URL("./app.html", window.location.href);
          dest.searchParams.set("desktop", "1");
          dest.searchParams.set("openHistorical", pitcher);
          window.location.href = dest.toString();
        }
        return;
      }
      if (event.target.closest("button, a, input, select, textarea")) return;
      const card = event.target.closest(".desktop-card");
      if (!card) return;
      flipCardFromPoint(card, event.clientX);
    });

    cardsContainer.addEventListener("keydown", event => {
      if (!["Enter", " "].includes(event.key)) return;
      const card = event.target.closest(".desktop-card");
      if (!card) return;
      event.preventDefault();
      const bounds = card.getBoundingClientRect();
      playCardFlipSound();
      flipCardFromPoint(card, bounds.left + bounds.width * 0.75);
    });

    searchInput.addEventListener("input", () => {
      searchQuery = searchInput.value || "";
      renderCards();
    });

    sortSelect.addEventListener("change", renderCards);

    filterToggle.addEventListener("click", () => {
      setControlsCollapsed(!controlsCollapsed);
    });

    document.addEventListener("visibilitychange", () => {
      if (document.hidden || !authAccepted || !dataRefreshQueued) return;
      dataRefreshQueued = false;
      refreshSupabaseData();
    });

    renderCards();
  </script>
</body>
</html>
