<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reset Password | ThePitchPredictor.com</title>
  <meta name="description" content="Create a new password for your PitchIQ account." />
  <meta name="theme-color" content="#050505" />

  <style>
    :root {
      --bg: #050505;
      --panel: rgba(12, 14, 20, 0.64);
      --line: rgba(255, 255, 255, 0.08);
      --line-strong: rgba(141, 138, 255, 0.28);
      --text: #f4f0e8;
      --muted: #a7afbc;
      --violet: #8d8aff;
      --violet-soft: rgba(141, 138, 255, 0.1);
      --amber: #ffb14a;
      --success: #8ddf9f;
      --danger: #ff8c7a;
      --radius: 18px;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.28);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 14%, rgba(141, 138, 255, 0.2), transparent 22%),
        radial-gradient(circle at 86% 10%, rgba(255, 177, 74, 0.18), transparent 20%),
        radial-gradient(circle at 62% 28%, rgba(86, 152, 255, 0.14), transparent 18%),
        radial-gradient(circle at 28% 52%, rgba(141, 138, 255, 0.12), transparent 20%),
        radial-gradient(circle at 76% 56%, rgba(255, 177, 74, 0.12), transparent 18%),
        radial-gradient(circle at 20% 82%, rgba(255, 177, 74, 0.14), transparent 20%),
        linear-gradient(180deg, #050505 0%, #090a10 100%);
    }

    .container {
      max-width: 1100px;
      min-height: 100vh;
      margin: auto;
      padding: 40px 20px;
      display: grid;
      place-items: center;
    }

    .panel {
      width: min(430px, 100%);
      background: linear-gradient(180deg, rgba(15, 17, 24, 0.72), rgba(10, 11, 17, 0.62));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 32px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .eyebrow {
      margin-bottom: 10px;
      color: var(--amber);
      font-size: clamp(1.25rem, 3vw, 1.65rem);
      font-weight: 800;
      letter-spacing: 0.03em;
      line-height: 1.1;
      text-align: center;
    }

    h1 {
      margin: 0;
      color: var(--text);
      font-size: clamp(1.15rem, 2.4vw, 1.35rem);
      line-height: 1.08;
      text-align: center;
    }

    p {
      margin: 12px 0 0;
      color: var(--muted);
      line-height: 1.6;
      text-align: center;
    }

    .reset-form {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 22px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .field label {
      color: var(--text);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .form-input {
      width: 100%;
      min-height: 44px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      font: inherit;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    .form-input:focus {
      outline: none;
      border-color: var(--line-strong);
      box-shadow:
        0 0 0 4px rgba(141, 138, 255, 0.16),
        inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }

    .action-button {
      width: 100%;
      min-height: 44px;
      margin-top: 4px;
      border: 1px solid rgba(141, 223, 159, 0.34);
      border-radius: 10px;
      background: linear-gradient(180deg, rgba(20, 74, 37, 0.98), rgba(15, 53, 28, 0.98));
      color: #d9ffe2;
      font: inherit;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
    }

    .action-button:disabled {
      cursor: default;
      opacity: 0.48;
    }

    .status {
      min-height: 1.2rem;
      margin: 0;
      font-size: 0.9rem;
      text-align: center;
      color: var(--muted);
    }

    .status.error {
      color: var(--danger);
    }

    .status.success {
      color: var(--success);
    }

    .back-link {
      display: inline-flex;
      justify-content: center;
      width: 100%;
      margin-top: 18px;
      color: #c7c4ff;
      text-decoration: underline;
      text-underline-offset: 3px;
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="panel" aria-labelledby="reset-title">
      <div class="eyebrow">PitchIQ Access</div>
      <h1 id="reset-title">Create a new password</h1>
      <p id="reset-copy">Open the recovery link from your email, then enter your new password here.</p>

      <form class="reset-form" id="reset-form" action="#" method="post">
        <div class="field">
          <label for="new-password">New Password</label>
          <input
            class="form-input"
            type="password"
            id="new-password"
            name="new_password"
            autocomplete="new-password"
            placeholder="Enter your new password"
            required
          />
        </div>

        <div class="field">
          <label for="confirm-password">Confirm Password</label>
          <input
            class="form-input"
            type="password"
            id="confirm-password"
            name="confirm_password"
            autocomplete="new-password"
            placeholder="Confirm your new password"
            required
          />
        </div>

        <button class="action-button" id="reset-submit" type="submit" disabled>Update Password</button>
        <p class="status" id="reset-status" aria-live="polite"></p>
      </form>

      <a class="back-link" href="./login.html">Back to login</a>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://odvopvoqssamjquinhft.supabase.co";
    const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_7g1yX__kNzT-6tj8Tr4SIg_T4BX9BlV";
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY, {
      auth: {
        autoRefreshToken: true,
        detectSessionInUrl: true,
        persistSession: true,
        storage: window.localStorage,
      },
    });

    const resetForm = document.getElementById("reset-form");
    const resetSubmit = document.getElementById("reset-submit");
    const resetStatus = document.getElementById("reset-status");
    const resetCopy = document.getElementById("reset-copy");

    let recoveryReady = false;

    function setStatus(message, kind = "") {
      resetStatus.textContent = message;
      resetStatus.className = `status${kind ? ` ${kind}` : ""}`;
    }

    function enableRecoveryForm() {
      recoveryReady = true;
      resetSubmit.disabled = false;
      resetCopy.textContent = "Recovery confirmed. Enter and confirm your new password.";
      setStatus("");
    }

    function failRecovery(message) {
      recoveryReady = false;
      resetSubmit.disabled = true;
      setStatus(message, "error");
    }

    supabaseClient.auth.onAuthStateChange((event, session) => {
      if (event === "PASSWORD_RECOVERY" || (session && (event === "SIGNED_IN" || event === "INITIAL_SESSION"))) {
        enableRecoveryForm();
      }
    });

    supabaseClient.auth.getSession().then(({ data, error }) => {
      if (error) {
        failRecovery("Unable to validate your reset link. Request a new password reset email.");
        return;
      }

      if (data.session) {
        enableRecoveryForm();
        return;
      }

      failRecovery("This reset link is missing or has expired. Request a new password reset email.");
    });

    resetForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      if (!recoveryReady) {
        failRecovery("This reset link is not active. Request a new password reset email.");
        return;
      }

      const formData = new FormData(resetForm);
      const newPassword = String(formData.get("new_password") || "");
      const confirmPassword = String(formData.get("confirm_password") || "");

      if (newPassword !== confirmPassword) {
        failRecovery("Passwords do not match.");
        return;
      }

      const { error } = await supabaseClient.auth.updateUser({ password: newPassword });

      if (error) {
        failRecovery(error.message);
        return;
      }

      setStatus("Password updated. Redirecting you to login...", "success");
      resetSubmit.disabled = true;
      window.setTimeout(async () => {
        await supabaseClient.auth.signOut();
        window.location.replace("./login.html");
      }, 1400);
    });
  </script>
</body>
</html>
